<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="icon" href="images/spotify_242118.svg" type="image/x-icon">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            background:#000;
            font-family:Arial;
            overflow:hidden;
        }

        /* 总容器 */
        .container{
            height:100vh;
            padding:6px;
            display:flex;
            flex-direction:column;
            gap:6px;
        }

        /* 顶部 */
        .header{
            height:70px;
            border-radius:6px;
            background:linear-gradient(to bottom,#101010,#050505);
            border:1px solid #111;
            box-shadow:inset 0 0 30px rgba(255,255,255,.03);
        }

        /* 中间 */
        .main{
            flex:1;
            display:flex;
            gap:6px;
            min-height:0;
        }

        /* 左侧 */
        .left{
            width:280px;
            min-width:150px;
            background:linear-gradient(to bottom,#101010,#050505);
            border-radius:6px;
            border:1px solid #111;
            box-shadow:inset 0 0 30px rgba(255,255,255,.03);
        }

        /* 拖拽条 */
        .drag-bar{
            width:8px;
            cursor:col-resize;
            position:relative;
            flex-shrink:0;
        }

        .drag-bar::after{
            content:"";
            position:absolute;
            left:50%;
            top:0;
            transform:translateX(-50%);
            width:2px;
            height:100%;
            background:#666;
            border-radius:10px;
        }

        .drag-bar:hover::after{
            background:#999;
        }

        /* 右侧 */
        .right{
            flex:1;
            min-width:200px;
            background:linear-gradient(to bottom,#101010,#050505);
            border-radius:6px;
            border:1px solid #111;
            box-shadow:inset 0 0 30px rgba(255,255,255,.03);
        }

        /* 底部 */
        .footer{
            height:55px;
            border-radius:6px;
            background:linear-gradient(to bottom,#101010,#050505);
            border:1px solid #111;
            box-shadow:inset 0 0 30px rgba(255,255,255,.03);
        }

    </style>
</head>
<body>

<div class="container">

    <!-- 顶部 -->
    <div class="header"></div>

    <!-- 中间 -->
    <div class="main">
        <div class="left"></div>

        <div class="drag-bar" id="dragBar"></div>

        <div class="right"></div>
    </div>

    <!-- 底部 -->
    <div class="footer"></div>

</div>


<script src="JS\pullBar.js"></script>

</body>
</html>
